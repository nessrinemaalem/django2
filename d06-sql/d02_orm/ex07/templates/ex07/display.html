<!DOCTYPE html>
<html>
<head>
    <title>Movies</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #eee;
        }
    </style>
</head>
<body>

<h1>Movies</h1>

<table>
    <thead>
        <tr>
            <th>Episode</th>
            <th>Title</th>
            <th>Opening Crawl</th>
            <th>Director</th>
            <th>Producer</th>
            <th>Release Date</th>
            <th>Created</th>
            <th>Updated</th>
        </tr>
    </thead>
    <tbody>
        {% for movie in movies %}
        <tr>
            <td>{{ movie.episode_nb }}</td>
            <td>{{ movie.title }}</td>
            <td>{{ movie.opening_crawl }}</td>
            <td>{{ movie.director }}</td>
            <td>{{ movie.producer }}</td>
            <td>{{ movie.release_date }}</td>
            <td>{{ movie.created }}</td>
            <td>{{ movie.updated }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
