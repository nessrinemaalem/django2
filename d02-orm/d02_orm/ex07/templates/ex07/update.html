<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Movie</title>
</head>
<body>
    <h1>Update Movie</h1>

    {% if movies %}
    <form method="POST">
        {% csrf_token %}

        <select name="movies">
            {% for movie in movies %}
            <option value="{{ movie.episode_nb }}">Episode {{ movie.episode_nb }} - {{ movie.title }} ({{ movie.release_date }})</option>
            {% endfor %}
        </select>

        <br><br>
        <input type="text" name="opening_crawl" placeholder="New Opening Crawl" required>

        <br><br>
        <button type="submit">Modifier</button>
    </form>
    {% else %}
        <p>No data available</p>
    {% endif %}

</body>
</html>
